version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stackr-postgres
    restart: always
    environment:
      POSTGRES_USER: stackr_user
      POSTGRES_PASSWORD: stackr_password
      POSTGRES_DB: stackr_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stackr-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
