version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: credimatch-postgres
    restart: always
    environment:
      POSTGRES_USER: credimatch_user
      POSTGRES_PASSWORD: credimatch_password
      POSTGRES_DB: credimatch_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: credimatch-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
